## CDS-Bond Basis Replication

This chart shows the CDS-bond basis (CDS par spread minus the bond's Z-spread, in
basis points), aggregated by rating category.

### Methodology

Based on Siriwardane, Sunderam, and Wallen's \"Segmented Arbitrage\" methodology.
The bond Z-spread is solved against a Nelson-Siegel-Svensson (GSW 2006) risk-free
