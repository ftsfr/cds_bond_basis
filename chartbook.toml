topic_tags = ["CDS", "bonds", "arbitrage", "basis", "fixed income", "credit"]
type_of_data_access = ["WRDS", "Public"]
data_license = "WRDS / Public"
license_expiration_date = ""
provider_contact_info = ""
restriction_on_use = "No"
how_is_pulled = "Markit CDS and bond returns (wrdsapps_bondret) pulled from WRDS"
path_to_parquet_data = "./_data/ftsfr_cds_bond_basis_aggregated.parquet"
path_to_excel_data = ""
date_col = "ds"
dataframe_docs_str = """
## CDS-Bond Basis (Aggregated)

Measures the CDS-bond basis (CDS par spread minus the bond's Z-spread, in bps) from the CDS and corporate bond markets, aggregated by rating category.

### Columns

| Column | Description |
|--------|-------------|
| unique_id | Rating category (Investment Grade, High Yield) |
| ds | Date |
| y | CDS-bond basis (basis points) |

### Methodology

Based on Siriwardane, Sunderam, and Wallen's "Segmented Arbitrage". The CDS-bond
basis is the CDS par spread minus the bond's Z-spread:
$$
\\text{basis}_{i, t, \\tau} = CDS_{i, t, \\tau} - Z_{i, t, \\tau}
$$

where $Z$ is solved against a Nelson-Siegel-Svensson (GSW 2006) risk-free curve
fit each quote date from the CRSP Treasury panel.

### Interpretation

- Negative basis: the bond is cheap relative to CDS; an investor could earn an
  arbitrage profit by going long the bond and buying CDS protection
- Investment Grade vs High Yield compares the basis across rating categories
"""

