[project]
name = "CDS-Bond Basis"
description = "CDS-Bond basis (CDS par spread minus the bond's Z-spread, in bps) from the single-name CDS and corporate bond markets"
contributors = [
    "Jeremy Bejarano",
    "Alex Wang",
    "Kausthub Kesheva",
    "Vincent Xu",
]
repo_url = "https://github.com/ftsfr/cds_bond_basis"
copyright = "2025"
os_compatibility = [
    "Windows/Linux/MacOS (WRDS required)",
]

[notebooks.summary_cds_bond_basis]
name = "summary_cds_bond_basis"
description = "Summary statistics and visualization of CDS-Bond basis"
path = "_output/summary_cds_bond_basis_ipynb.ipynb"
publishable = true

[dataframes.ftsfr_cds_bond_basis_aggregated]
name = "ftsfr_cds_bond_basis_aggregated"
description = "Aggregated CDS-Bond basis by rating category"
sources = [
    "WRDS Markit",
    "WRDS Bond Returns (wrdsapps_bondret)",
]
providers = [
    "WRDS",
]
contact_required = [
    "no",
]
pre_approved = [
    "No",
]
provider_links = [
    "https://wrds-www.wharton.upenn.edu",
]
tags = [
    "CDS",
    "bonds",
    "arbitrage",
    "basis",
    "fixed income",
    "credit",
]
access_types = [
    "WRDS",
    "Public",
]
license = "WRDS / Public"
restrictions = "No"
pull_method = "Markit CDS and bond returns (wrdsapps_bondret) pulled from WRDS"
path = "./_data/ftsfr_cds_bond_basis_aggregated.parquet"
date_col = "ds"
docs = """
## CDS-Bond Basis (Aggregated)

Measures the CDS-bond basis (CDS par spread minus the bond's Z-spread, in bps) from the CDS and corporate bond markets, aggregated by rating category.

### Columns

| Column | Description |
|--------|-------------|
| unique_id | Rating category (Investment Grade, High Yield) |
| ds | Date |
| y | CDS-bond basis (basis points) |

### Methodology

Based on Siriwardane, Sunderam, and Wallen's \"Segmented Arbitrage\". The CDS-bond
basis is the CDS par spread minus the bond's Z-spread:
$$
\\text{basis}_{i, t, \\tau} = CDS_{i, t, \\tau} - Z_{i, t, \\tau}
$$

where $Z$ is solved against a Nelson-Siegel-Svensson (GSW 2006) risk-free curve
fit each quote date from the CRSP Treasury panel.

### Interpretation

- Negative basis: the bond is cheap relative to CDS; an investor could earn an
  arbitrage profit by going long the bond and buying CDS protection
- Investment Grade vs High Yield compares the basis across rating categories
"""

