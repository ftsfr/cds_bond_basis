[config]
type = "pipeline"
chartbook_format_version = "0.0.2"

[site]
title = "CDS-Bond Basis"
author = "Jeremy Bejarano"
copyright = "2025"
logo_path = ""
favicon_path = ""

[pipeline]
id = "cds_bond_basis"
pipeline_name = "CDS-Bond Basis"
pipeline_description = "CDS-Bond basis (CDS par spread minus the bond's Z-spread, in bps) from the single-name CDS and corporate bond markets"
lead_pipeline_developer = "Jeremy Bejarano"
contributors = ["Jeremy Bejarano", "Alex Wang", "Kausthub Kesheva", "Vincent Xu"]
runs_on = "Windows/Linux/MacOS (WRDS required)"
git_repo_URL = "https://github.com/ftsfr/cds_bond_basis"
README_file_path = "./README.md"

[notebooks]

[notebooks.summary_cds_bond_basis]
notebook_name = "summary_cds_bond_basis"
notebook_description = "Summary statistics and visualization of CDS-Bond basis"
notebook_path = "_output/summary_cds_bond_basis_ipynb.ipynb"
is_publishable = true

[charts]

[charts.cds_bond_basis_replication]
chart_name = "CDS-Bond Basis Replication"
short_description_chart = "CDS-Bond basis (bps) by rating category"
dataframe_id = "ftsfr_cds_bond_basis_aggregated"
path_to_html_chart = "./_output/cds_bond_basis_replication.html"
path_to_excel_chart = ""
topic_tags = ["CDS", "bonds", "arbitrage", "basis", "replication"]
past_publications = ["Siriwardane, Sunderam, and Wallen - Segmented Arbitrage", "Nozawa (2017) - What Drives the Cross-Section of Credit Spreads?"]
chart_docs_str = """
## CDS-Bond Basis Replication

This chart shows the CDS-bond basis (CDS par spread minus the bond's Z-spread, in
basis points), aggregated by rating category.

### Methodology

Based on Siriwardane, Sunderam, and Wallen's "Segmented Arbitrage" methodology.
The bond Z-spread is solved against a Nelson-Siegel-Svensson (GSW 2006) risk-free
curve fit each quote date from the CRSP Treasury panel.

### Interpretation

- A negative basis indicates the bond is cheap relative to CDS (negative-basis arbitrage)
- Investment Grade vs High Yield comparison shows the basis across rating categories
"""

[dataframes]

[dataframes.ftsfr_cds_bond_basis_aggregated]
dataframe_name = "ftsfr_cds_bond_basis_aggregated"
